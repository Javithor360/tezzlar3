#####################
#    Tezzlar III    #
#####################

prefix: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b> <color:#F54848><shadow:#0D1E40:1>»</shadow></color><reset> "
worldName: "world"
day: 1

# Quality of Life Module
qol:
  enabled: true
  totems:
    alert: true
    message: "&b%player_name% &7ha activado un tótem en &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    playSound: true
    soundName: "minecraft:entity.vindicator.hurt"
  sharecoordinates:
    enabled: true
    publicMessage: "&b%player_name% &7se encuentra en &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    privateMessage: "&b%player_name% &7te ha compartido su ubicación, &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    selfMessage: "&7Tu ubicación es &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    sentPrivateConfirmation: "&7Has compartido tu ubicación con &b%player_name%&7."
    playSound: true
    soundPublic: "minecraft:entity.player.levelup"
    soundPrivate: "minecraft:entity.player.levelup"

# Hardcore Module
hardcore:
  enabled: true
  placeSkullOnDeath: true
  messages:
    kickMessage: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b><newline><newline><dark_red>¡Acabas de morir y perder tu <yellow>%tezzlar_totaldeaths%°</yellow> vida en modo Hardcore!<newline>Por lo tanto se te ordena que tomes un descanso.</dark_red><newline><newline><gray>Podrás volver a jugar dentro de <red>%ban_duration%</red>.</gray>"
    banMessage: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b><newline><newline><dark_red>¡Has perdido tu <yellow>%tezzlar_totaldeaths%°</yellow> vida en modo Hardcore!<newline>Por lo tanto has sido exhortado a tomar un descanso.</dark_red><newline><newline><gray>Podrás volver a jugar dentro de <red>%ban_duration%</red>.</gray>"
    warnKickMessage: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b><newline><newline><red>¡Acabas de morir y perder una vida en modo Hardcore!</red><newline><red>Pero no te preocupes que no has sido baneado aún.</red><newline><yellow>Se te recomienda tomar un breve respiro antes de volver a entrar.</yellow><newline><newline><gray>Vidas disponibles: <aqua>%tezzlar_lives%</aqua>/<aqua>%tezzlar_maxlives%</aqua></gray>"
    deathTitle: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b>"
    deathSubtitle: "<white>%player_name% ha muerto</white>"
    genericDeathMessage: "<red>Las fuerzas del mal en este mundo han sumido en las tinieblas a <yellow>%player_name%</yellow> llevándose su alma y castigándonos con sus represalias.</red>"
    deathMessages:
      default: "<gray>%player_name% ha muerto y ha perdido una de sus vidas.</gray>"
  deathSounds: # - sound;volume;pitch
    - "entity.wither.death;1.0;0.0"
    - "entity.lightning_bolt.thunder;1.0;2.0"

# Inventory Module
inventory:
  enabled: true
  revenantZombie: true
  revenant:
    health: 50.0
    minions:
      - ZOMBIE
#      - ZOMBIE_VILLAGER
#      - HUSK
#      - DROWNED
#      - WITCH
#      - SKELETON
#      - STRAY
#      - BOGGED
#      - PARCHED
#      - SPIDER
#      - CAVE_SPIDER
#      - PHANTOM
#      - SLIME
#      - VEX
#      - PILLAGER
#      - VINDICATOR
#      - EVOKER
#      - RAVAGER
#      - ZOGLIN
#      - WITHER_SKELETON
#      - CREEPER
#      - BREEZE
#      - BLAZE
#      - ILLUSIONER
#      - BAT
    minionCount: 1
  deathCoordsReminder: "<gray>Parece que tienes una tumba activa en <red><bold>X:</bold> {x}  <bold>Y:</bold> {y}  <bold>Z:</bold> {z} ({dimension})</red>. Se te recomienda pedir ayuda a un compañero para recuperar tus cosas.</gray>"

# Timeline Module
timeline:
  messages:
    day_change_title: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b>"
    day_change_subtitle: "<#f5ff87>El día <#81C784>%day%</#81C784> ha comenzado</#f5ff87>."
    day_change_chat: "<dark_red><b>[!]</b> <red>Ha comenzado el día <dark_red>%day%</dark_red>. ¡Prepárate!"
  sound: "entity.ender_dragon.growl;1.0;0.8" # sound;volume;pitch

# Missions Module
missions:
  refuge:
    x: 1000
    y: 64
    z: 1000
    radius: 30
    duration: 300
  messages:
    punishment_warning: "&c[!] Tienes castigos activos. Usa /punishments para verlos."
    individual_completed: "&aEl jugador &e%player% &acompletó la misión: &6%mission%"
    group_completed: "&a¡Todos han completado la misión grupal: &6%mission%!"
    reward_claimed: "&eHas reclamado las recompensas de la misión: &6%mission%"
    rewards_empty: "&cNo tienes recompensas pendientes por reclamar."
    punishments_empty: "&aNo tienes castigos activos."
  punishments_dictionary:
    DIAMOND_BAN: "No puedes guardar diamantes en tu inventario."
    DAMAGE_MULTIPLIER: "Recibes 1.5x de daño de todas las fuentes."
    HOSTILE_IRON_GOLEMS: "Los Gólems de Hierro te atacarán naturalmente."
    REGENERATION_TO_WITHER: "Recibes Wither II en lugar de Regeneración."
    WITHER_SKELETON_SPAWN_ON_DAMAGE: "Posibilidad de invocar Esqueletos Wither al recibir daño en el Nether."

# Mini Events Module
mini-events:
  probability: 10
  messages:
    event_start: "&a¡Ha dado inicio el evento de &4%event_name%!"
    event_end: "&e¡El evento de &a%event_name% &eha concluido!"