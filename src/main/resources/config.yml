#####################
#    Tezzlar III    #
#####################

prefix: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b> <color:#F54848><shadow:#0D1E40:1>»</shadow></color><reset> "

# Quality of Life Module
qol:
  enabled: true
  totems:
    alert: true
    message: "&b%player_name% &7ha activado un tótem en &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    playSound: true
    soundName: "minecraft:entity.vindicator.hurt"
  sharecoordinates:
    enabled: true
    publicMessage: "&b%player_name% &7se encuentra en &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    privateMessage: "&b%player_name% &7te ha compartido su ubicación, &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    selfMessage: "&7Tu ubicación es &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    sentPrivateConfirmation: "&7Has compartido tu ubicación con &b%player_name%&7."
    playSound: true
    soundPublic: "minecraft:entity.player.levelup"
    soundPrivate: "minecraft:entity.player.levelup"

# Hardcore Module
hardcore:
  enabled: true
  placeSkullOnDeath: true
  messages:
    kickMessage: "<dark_red><bold>¡Has perdido una vida Hardcore!</bold></dark_red><newline><red>Muertes totales: <yellow>%deaths%</yellow></red><newline><gray>Estarás exiliado por <red>%ban_duration%</red>.</gray>"
    banMessage: "<dark_red><bold>¡Has perdido una vida Hardcore!</bold></dark_red><newline><red>Muertes totales: <yellow>%deaths%</yellow></red><newline><gray>Tu exilio terminará en <red>%ban_duration%</red>.</gray>"
    warnKickMessage: "<red>¡Has muerto!</red><newline><gray>Esta fue tu muerte #<yellow>%deaths%</yellow> de 3 permitidas libres.</gray><newline><yellow>Tómate un respiro antes de volver a entrar.</yellow>"
    broadcastMessage: "<dark_red><bold>[HARDCORE]</bold></dark_red> <red>El jugador <yellow>%player_name%</yellow> ha caído (Muerte #%deaths%).</red>"
  deathSounds:
    - "entity.wither.spawn;1.0;0.5"
    - "entity.lightning_bolt.thunder;1.0;1.0"

# Inventory Module
inventory:
  enabled: true
  revenantZombie: true
  revenant:
    minions:
      - ZOMBIE
      - SKELETON
      - CAVE_SPIDER
      - SLIME
      - HUSK
      - BOGGED
      - PARCHED
      - DROWNED
    minionCount: 3