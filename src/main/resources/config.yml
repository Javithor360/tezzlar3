#####################
#    Tezzlar III    #
#####################

prefix: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b> <color:#F54848><shadow:#0D1E40:1>»</shadow></color><reset> "
worldName: "world"
day: 1

# Quality of Life Module
qol:
  enabled: true
  totems:
    alert: true
    message: "&b%player_name% &7ha activado un tótem en &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    playSound: true
    soundName: "minecraft:entity.vindicator.hurt"
  sharecoordinates:
    enabled: true
    publicMessage: "&b%player_name% &7se encuentra en &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    privateMessage: "&b%player_name% &7te ha compartido su ubicación, &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    selfMessage: "&7Tu ubicación es &bX: &7%player_x% &bY: &7%player_y% &bZ: &7%player_z% (&b%player_world_type%&7)"
    sentPrivateConfirmation: "&7Has compartido tu ubicación con &b%player_name%&7."
    playSound: true
    soundPublic: "minecraft:entity.player.levelup"
    soundPrivate: "minecraft:entity.player.levelup"

# Hardcore Module
hardcore:
  enabled: true
  placeSkullOnDeath: true
  messages:
    kickMessage: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b><newline><newline><dark_red>¡Acabas de morir y perder tu <yellow>%deaths%°</yellow> vida en modo Hardcore!<newline>Por lo tanto se te ordena que tomes un descanso.</dark_red><newline><newline><gray>Podrás volver a jugar dentro de <red>%ban_duration%</red>.</gray>"
    banMessage: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b><newline><newline><dark_red>¡Has perdido tu <yellow>%deaths%°</yellow> vida en modo Hardcore!<newline>Por lo tanto has sido exhortado a tomar un descanso.</dark_red><newline><newline><gray>Podrás volver a jugar dentro de <red>%ban_duration%</red>.</gray>"
    warnKickMessage: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b><newline><newline><red>¡Acabas de morir y perder <yellow>una</yellow> vida en modo Hardcore!<newline>Pero no te preocupes que no has sido baneado aún.</red><newline><yellow>Se te recomienda tomar un breve respiro antes de volver a entrar.</yellow><newline><newline><gray>Vidas utilizadas: <aqua>%deaths%</aqua>/3</gray>"
    deathTitle: "<b><gradient:#5FE2C5:#C6DEF1:#5FE2C5><shadow:#0D1E40:1>TEZZLAR</shadow></gradient></b>"
    deathSubtitle: "<white>%player_name% ha muerto</white>"
    genericDeathMessage: "<red>Las fuerzas del mal en este mundo han sumido en las tinieblas a <yellow>%player_name%</yellow> llevándose su alma y castigándonos con sus represalias.</red>"
    deathMessages:
      default: "<gray>%player_name% ha muerto y ha perdido una de sus vidas.</gray>"
  deathSounds:
    - "entity.wither.death;1.0;0.0"
    - "entity.lightning_bolt.thunder;1.0;2.0"

# Inventory Module
inventory:
  enabled: true
  revenantZombie: true
  revenant:
    minions:
      - ZOMBIE
#      - ZOMBIE_VILLAGER
#      - HUSK
#      - DROWNED
#      - WITCH
#      - SKELETON
#      - STRAY
#      - BOGGED
#      - PARCHED
#      - SPIDER
#      - CAVE_SPIDER
#      - PHANTOM
#      - SLIME
#      - VEX
#      - PILLAGER
#      - VINDICATOR
#      - EVOKER
#      - RAVAGER
#      - ZOGLIN
#      - WITHER_SKELETON
#      - CREEPER
#      - BREEZE
#      - BLAZE
#      - ILLUSIONER
#      - BAT
    minionCount: 3
  deathCoordsReminder: "<gray>Parece que tienes una tumba activa en <red><bold>X:</bold> {x}  <bold>Y:</bold> {y}  <bold>Z:</bold> {z} ({dimension})</red>. Se te recomienda pedir ayuda a un compañero para recuperar tus cosas.</gray>"